# ruff.toml — standalone Ruff configuration
#
# Use this file if your project does not use pyproject.toml.
# Prefer [tool.ruff] sections in pyproject.toml when that file exists.
#
# Usage: Copy to your project root.

# ---------------------------------------------------------------------------
# General settings
# ---------------------------------------------------------------------------

line-length = 88
target-version = "py311"
src = ["src"]

# ---------------------------------------------------------------------------
# Linter
# ---------------------------------------------------------------------------

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "UP",    # pyupgrade
    "S",     # flake8-bandit (security)
    "N",     # pep8-naming
    "ANN",   # flake8-annotations
    "RUF",   # ruff-specific rules
    "PT",    # flake8-pytest-style
    "SIM",   # flake8-simplify
    "BLE",   # flake8-blind-except
    "PL",    # pylint
]

ignore = [
    "D100",    # missing docstring in public module
    "D104",    # missing docstring in public package
    "D203",    # one-blank-line-before-class (conflicts with D211)
    "D213",    # multi-line-summary-second-line (conflicts with D212)
    "ANN101",  # missing-type-self (self annotation not required)
    "ANN102",  # missing-type-cls (cls annotation not required)
]

fixable = ["ALL"]
unfixable = ["ERA"]   # never auto-delete commented code

[lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",    # allow `assert` statements in tests
    "ANN",     # type annotations optional in test functions
    "D",       # docstrings optional in test files
    "PLR2004", # allow magic values in tests
]
"src/**/__init__.py" = [
    "F401",    # allow unused imports in __init__.py (re-exports)
]

[lint.isort]
known-first-party = ["src"]
force-sort-within-sections = true

[lint.pydocstyle]
convention = "google"  # "google", "numpy", or "pep257"

# ---------------------------------------------------------------------------
# Formatter
# ---------------------------------------------------------------------------

[format]
quote-style = "double"       # "double" or "single"
indent-style = "space"       # "space" or "tab"
magic-trailing-comma = true  # preserve intentional trailing commas
line-ending = "auto"         # "auto", "lf", or "crlf"
