# pytest.ini — standalone pytest configuration
#
# Use this file if your project does not use pyproject.toml.
# Prefer configuring pytest in pyproject.toml [tool.pytest.ini_options]
# when a pyproject.toml already exists.
#
# Usage: Copy to your project root alongside your test suite.

[pytest]

# Directories pytest searches for tests
testpaths = tests

# Default flags passed to every pytest invocation
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-fail-under=100

# Custom markers — must be declared here when --strict-markers is set
markers =
    unit: fast, isolated unit tests (no external I/O)
    integration: tests that touch files, databases, or network
    slow: long-running tests (more than 1 second)

# Minimum pytest version required
minversion = 8.0

# Show warnings as errors in tests
filterwarnings =
    error
    ignore::DeprecationWarning:pydantic.*:
    ignore::DeprecationWarning:pkg_resources.*:
